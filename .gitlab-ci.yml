spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/docker.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

variables:
  OCUDU_REGISTRY_URI: ${CI_TEMPLATE_REGISTRY_HOST}/$[[ inputs.ocudu_path ]]

stages:
  - ci
  - test
  - build
  - publish

headers:
  stage: ci
  extends: .headers

################################################################################
# Test
################################################################################

yang validation:
  stage: test
  image: ubuntu:22.04
  rules:
    - if: $ON_MR
  variables:
    DEBIAN_FRONTEND: noninteractive
    YANG_REPO_3GPP_TAG: Tag_Rel16_SA104
  script:
    - apt update && apt install -y --no-install-recommends git ca-certificates python3-pip wget unzip
    - pip install pyang
    - ${CI_PROJECT_DIR}/custom_yangs/download_yang_models.sh /opt/dev
    - |
      pyang --path /opt/dev/MnS/yang-models \
        ${CI_PROJECT_DIR}/custom_yangs/*.yang /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-compression-factors.yang \
        /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-module-cap.yang \
        /opt/dev/modeling/data-model/yang/published/o-ran/ru-fh/o-ran-wg4-features.yang \
        /opt/dev/modeling/data-model/yang/published/ietf/*.yang \
        -f sample-xml-skeleton --sample-xml-skeleton-defaults --sample-xml-skeleton-annotations > 3gpp_yang_tree.out
  artifacts:
    when: always
    paths:
      - 3gpp_yang_tree.out
    expire_in: 1 hour

################################################################################
# Publish Docker images
################################################################################

.publish:
  stage: publish
  rules:
    - if: $CI_PIPELINE_SCHEDULE_DESCRIPTION =~ /Nightly/
  retry: 2
  interruptible: false

netconf image:
  extends:
    - .docker-builder
    - .publish
  variables: &netconf-image-variables
    # Docker
    REGISTRY_URI: ${CI_REGISTRY_IMAGE}
    CONTEXT: ${CI_PROJECT_DIR}
    MODE: publish
  tags:
    - saas-linux-medium-${PLATFORM}
  before_script:
    # Set variables
    - |
      export NAME="netconf_nightly_${SUFFIX}"
      export VERSION="$(git show -s --date=format:%Y%m%d --format=%cd ${CI_COMMIT_SHA})_${CI_COMMIT_SHORT_SHA}"
      echo "CI_SHARED_NETCONF_IMAGE_VERSION=${VERSION}" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env
  parallel: &matrix-netconf-image-variants
    matrix:
      # AMD
      - SUFFIX: amd64
        MARCH: x86-64-v3
        TAG: amd64
        PLATFORM: amd64
      # ARM
      - SUFFIX: arm64
        MARCH: armv8.2-a+crypto+fp16+dotprod
        TAG: arm64
        PLATFORM: arm64
  needs: []

netconf image update latest:
  extends:
    - .docker manifest
    - .publish
  variables:
    <<: *netconf-image-variables

  script:
    - |
      export NAME="netconf_nightly_${SUFFIX}"
      export VERSION="${CI_SHARED_NETCONF_IMAGE_VERSION}"
      docker manifest create ${REGISTRY_URI}/${NAME}:latest --amend ${REGISTRY_URI}/${NAME}:${VERSION}
      docker manifest push ${REGISTRY_URI}/${NAME}:latest
      echo "Image ${RETINA_REGISTRY_URI}/${NAME}:latest pushed"
  parallel: *matrix-netconf-image-variants
  needs:
    - job: netconf image
      artifacts: true
